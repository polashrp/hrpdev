# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # ===== NEW: Inject API Key into JavaScript =====
      - name: Inject API Key into JavaScript
        run: |
          # Create a config file with the API key from GitHub Secrets
          echo "// This file is auto-generated by GitHub Actions" > config.js
          echo "window.GEMINI_API_KEY = '${{ secrets.GEMINI_API_KEY }}';" >> config.js
          echo "window.API_ENDPOINT = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';" >> config.js
          echo "window.API_MODEL = 'gemini-1.5-flash';" >> config.js
          
          # Display confirmation (hides the actual key)
          echo "✅ config.js created successfully!"
          echo "📡 API endpoint configured"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
