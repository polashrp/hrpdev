name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject API Key into JavaScript
        run: |
          echo "// This file is auto-generated by GitHub Actions" > config.js
          echo "window.GEMINI_API_KEY = '${{ secrets.GEMINI_API_KEY }}';" >> config.js
          echo "window.API_ENDPOINT = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';" >> config.js
          echo "window.API_MODEL = 'gemini-1.5-flash';" >> config.js
          echo "✅ config.js created successfully!"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
